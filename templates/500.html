{% extends 'base.html' %}
{% load static %}

{% block title %}Erro interno{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center py-5">
            <div class="mb-4" style="font-size: 5rem; line-height: 1; color: var(--danger);">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="fw-bold mb-2" style="font-size: 6rem; color: var(--gray-800); line-height: 1;">500</h1>
            <h2 class="fw-semibold mb-3" style="color: var(--gray-700);">Algo deu errado</h2>
            <p class="text-muted mb-4" style="font-size: 1.05rem;">
                Encontramos um problema inesperado no servidor. Nossa equipe já foi notificada.
                Por favor, tente novamente em alguns instantes.
            </p>
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a href="{% url 'core:home' %}" class="btn btn-primary px-4 py-2">
                    <i class="fas fa-home me-2"></i>Voltar ao início
                </a>
                <button onclick="window.location.reload()" class="btn btn-outline-secondary px-4 py-2">
                    <i class="fas fa-redo me-2"></i>Tentar novamente
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
