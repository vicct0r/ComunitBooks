{% extends "base.html" %}
{% load i18n %}

{% block title %}Sair{% endblock %}

{% block content %}
<div class="card-page">
    <div class="card-page-inner">
        <div class="card-page-header">
            <span class="card-page-icon">
                <i class="fas fa-sign-out-alt"></i>
            </span>
            <h1 class="card-page-title">Sair</h1>
            <p class="card-page-subtitle">Tem certeza que deseja sair?</p>
        </div>

        <div class="card-page-body text-center">
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                {% endif %}

                <p class="text-muted mb-4">Você está prestes a sair da sua conta. Deseja continuar?</p>

                <div class="d-grid gap-2">
                    <button class="btn btn-danger" type="submit">
                        <i class="fas fa-sign-out-alt me-2"></i>Sim, Sair
                    </button>
                    <a class="btn btn-secondary" href="{% url 'core:home' %}">
                        <i class="fas fa-arrow-left me-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
